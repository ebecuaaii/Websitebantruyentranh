<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaleidoscope - Quản lý tài khoản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-shell">
    <aside class="admin-sidebar">
        <div class="admin-logo">
            <img src="https://placehold.co/44x44/ffffff/9f2425?text=K" alt="Kaleidoscope Logo">
            <span>Kaleidoscope</span>
        </div>
        <nav class="admin-nav">
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-box"></i> Quản lý sản phẩm</a>
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-layer-group"></i> Quản lý danh mục</a>
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-bag-shopping"></i> Quản lý đơn hàng</a>
            <a href="admin-users.html" class="admin-nav-item active"><i class="fa-solid fa-users"></i> Quản lý người dùng</a>
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-ticket"></i> Coupon/Khuyến mãi</a>
            <a href="#" class="admin-nav-item"><i class="fa-solid fa-gear"></i> Cài đặt</a>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div class="admin-title">
                <a class="admin-back" href="auth.html"><i class="fa-solid fa-arrow-left"></i></a>
                <h1>QUẢN LÝ TÀI KHOẢN</h1>
            </div>
            <div class="admin-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Tìm kiếm theo tên, email, sđt">
            </div>
            <div class="admin-filter">
                <label>Sắp xếp:</label>
                <select>
                    <option>Mới nhất</option>
                    <option>Cũ nhất</option>
                </select>
            </div>
        </header>

        <section class="admin-form">
            <h2>Thêm / Cập nhật tài khoản</h2>
            <form id="adminUserForm">
                <input type="hidden" name="id">
                <div class="admin-form-grid">
                    <div>
                        <label>Username *</label>
                        <input type="text" name="username" required>
                    </div>
                    <div>
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div>
                        <label>Mật khẩu *</label>
                        <input type="password" name="password" required>
                    </div>
                    <div>
                        <label>Họ tên</label>
                        <input type="text" name="fullName">
                    </div>
                    <div>
                        <label>Số điện thoại</label>
                        <input type="text" name="phone">
                    </div>
                    <div>
                        <label>Avatar URL</label>
                        <input type="text" name="avatar">
                    </div>
                    <div>
                        <label>Vai trò</label>
                        <select name="role">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <div class="admin-check">
                        <label>
                            <input type="checkbox" name="enabled" checked>
                            Hoạt động
                        </label>
                    </div>
                </div>
                <div class="admin-form-actions">
                    <button type="submit" class="auth-btn primary">Lưu</button>
                    <button type="button" class="auth-btn" id="adminUserReset">Làm mới</button>
                </div>
            </form>
        </section>

        <section class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Người dùng</th>
                        <th>Vai trò</th>
                        <th>Số điện thoại</th>
                        <th>Email</th>
                        <th>Ngày đăng ký</th>
                        <th>Trạng thái</th>
                        <th>Tác vụ</th>
                    </tr>
                </thead>
                <tbody id="adminUserTbody"></tbody>
            </table>
        </section>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>
