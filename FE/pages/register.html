<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaleidoscope - Đăng ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-shell">
    <div class="auth-card wide">
        <div class="auth-brand">
            <img src="https://placehold.co/52x52/ffffff/9f2425?text=K" alt="Kaleidoscope Logo">
            <span>Kaleidoscope</span>
        </div>
        <h1>CHÀO MỪNG BẠN ĐẾN VỚI Kaleidoscope</h1>
        <form class="auth-form" id="registerForm">
            <label>Họ và tên *</label>
            <input type="text" name="fullName" placeholder="Nhập họ và tên" required>

            <label>Số điện thoại *</label>
            <input type="text" name="phone" placeholder="Nhập số điện thoại" required>

            <label>Email *</label>
            <input type="email" name="email" placeholder="Nhập email" required>

            <label>Tên đăng nhập *</label>
            <input type="text" name="username" placeholder="Nhập tên đăng nhập" required>

            <label>Mật khẩu *</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu" required>

            <label>Xác nhận mật khẩu *</label>
            <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>

            <button class="auth-btn primary" type="submit">ĐĂNG KÝ</button>
        </form>
        <div class="auth-foot">
            <span>Bạn đã có tài khoản?</span>
            <a href="login.html">Đăng nhập</a>
        </div>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
