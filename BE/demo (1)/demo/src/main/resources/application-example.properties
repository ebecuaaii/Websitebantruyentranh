spring.config.import=optional:file:.env[.properties]

spring.application.name=comic-store

# MongoDB Atlas - đọc từ .env
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DB:comic_store}

# Server
server.port=${SERVER_PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:your-secret-key-here-make-it-long-and-secure}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Default admin account
app.admin.username=admin
app.admin.email=admin@kaleidoscope.vn
app.admin.password=Admin@123

# CORS
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
