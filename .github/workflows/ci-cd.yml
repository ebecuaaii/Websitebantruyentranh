name: CI/CD Pipeline - Comic Store

# Trigger: chạy khi push hoặc PR vào nhánh main/dev
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:

  # ── JOB 1: BUILD & TEST Backend ─────────────────────
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest  # Chạy trên máy ảo Ubuntu mới nhất

    steps:
      # Bước 1: Checkout source code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'  # Eclipse Temurin (OpenJDK)
          cache: maven              # Cache Maven dependencies để build nhanh hơn

      # Bước 3: Build và chạy test
      - name: Build with Maven
        working-directory: "./BE/demo (1)/demo"
        run: mvn clean package -DskipTests  # Build JAR, bỏ qua test (MongoDB cần connection)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Bước 4: Lưu file JAR để dùng ở job sau
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ./BE/demo (1)/demo/target/*.jar

  # ── JOB 2: BUILD & PUSH Docker Images ───────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-backend  # Chờ job build-backend thành công mới chạy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Đăng nhập Docker Hub dùng secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build và push Backend image với 2 tags: version + latest
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: "./BE/demo (1)/demo"
          push: true
          tags: |
            nguyenhongoctruc/webbantruyen-backend:1.0
            nguyenhongoctruc/webbantruyen-backend:latest

      # Build và push Frontend image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          push: true
          tags: |
            nguyenhongoctruc/webbantruyen-frontend:1.0
            nguyenhongoctruc/webbantruyen-frontend:latest

  # ── JOB 3: DEPLOY thông báo ─────────────────────────
  notify-deploy:
    name: Notify Deploy Success
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy notification
        run: |
          echo "✅ Deploy thành công!"
          echo "Backend: https://hub.docker.com/r/nguyenhongoctruc/webbantruyen-backend"
          echo "Frontend: https://hub.docker.com/r/nguyenhongoctruc/webbantruyen-frontend"
