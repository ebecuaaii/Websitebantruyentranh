name: CI/CD Pipeline - Comic Store

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: "./BE/demo (1)/demo"
        run: mvn clean package -DskipTests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: "./BE/demo (1)/demo/target/*.jar"

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: "./BE/demo (1)/demo/target"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: "./BE/demo (1)/demo"
          file: "./BE/demo (1)/demo/Dockerfile"
          push: true
          tags: |
            nguyenhongoctruc/webbantruyen-backend:1.0
            nguyenhongoctruc/webbantruyen-backend:latest

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./FE
          file: ./FE/Dockerfile
          push: true
          tags: |
            nguyenhongoctruc/webbantruyen-frontend:1.0
            nguyenhongoctruc/webbantruyen-frontend:latest

  notify-deploy:
    name: Notify Deploy Success
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy notification
        run: |
          echo "Deploy thanh cong!"
          echo "Backend: https://hub.docker.com/r/nguyenhongoctruc/webbantruyen-backend"
          echo "Frontend: https://hub.docker.com/r/nguyenhongoctruc/webbantruyen-frontend"
